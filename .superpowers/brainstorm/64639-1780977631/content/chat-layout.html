<h2>WeSee 聊天桌面端 - 整体布局</h2>
<p class="subtitle">左右两栏布局：左侧菜单栏 + 右侧聊天区</p>

<div style="display:flex;gap:20px;justify-content:center;align-items:flex-start;">
  <div class="mockup" style="flex:0 0 260px;">
    <div class="mockup-header">左侧菜单栏</div>
    <div class="mockup-body">
      <!-- 上半部分 -->
      <div style="padding:12px;border-bottom:1px solid var(--border, #e0e0e0);">
        <div class="label" style="margin-bottom:8px;">功能菜单</div>
        <div style="padding:10px 12px;margin-bottom:4px;background:var(--accent-light, #eef2ff);border-radius:8px;font-weight:600;font-size:14px;">
          💬 新建会话
        </div>
        <div style="padding:10px 12px;margin-bottom:4px;border-radius:8px;font-size:14px;color:var(--text-secondary, #666);">
          ⏰ 定时任务
        </div>
      </div>
      <!-- 下半部分 -->
      <div style="padding:12px;">
        <div class="label" style="margin-bottom:8px;">历史会话</div>
        <div class="placeholder" style="margin-bottom:6px;padding:8px;border-radius:6px;text-align:left;font-size:13px;">📝 项目进展讨论</div>
        <div class="placeholder" style="margin-bottom:6px;padding:8px;border-radius:6px;text-align:left;font-size:13px;">📝 周末计划同步</div>
        <div class="placeholder" style="margin-bottom:6px;padding:8px;border-radius:6px;text-align:left;font-size:13px;">📝 日报汇总</div>
        <div style="text-align:center;color:var(--text-secondary, #999);font-size:13px;padding:8px;">+ 更多历史会话...</div>
      </div>
    </div>
  </div>

  <div class="mockup" style="flex:1;">
    <div class="mockup-header">右侧聊天框</div>
    <div class="mockup-body">
      <!-- 消息列表 -->
      <div class="placeholder" style="min-height:280px;margin-bottom:0;display:flex;flex-direction:column;gap:10px;padding:16px;text-align:left;">
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <div style="width:32px;height:32px;background:#ddd;border-radius:50%;flex-shrink:0;"></div>
          <div style="background:#f0f0f0;padding:10px 14px;border-radius:12px;max-width:70%;font-size:14px;">今天的项目进展怎么样了？</div>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-start;flex-direction:row-reverse;">
          <div style="width:32px;height:32px;background:#99cfff;border-radius:50%;flex-shrink:0;"></div>
          <div style="background:#007AFF;color:#fff;padding:10px 14px;border-radius:12px;max-width:70%;font-size:14px;">还不错，刚完成了前端重构</div>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <div style="width:32px;height:32px;background:#ddd;border-radius:50%;flex-shrink:0;"></div>
          <div style="background:#f0f0f0;padding:10px 14px;border-radius:12px;max-width:70%;font-size:14px;">太好了！晚上想吃什么？</div>
        </div>
      </div>
      <!-- 输入框 -->
      <div style="display:flex;gap:8px;padding:12px;border-top:1px solid var(--border, #e0e0e0);">
        <input class="mock-input" placeholder="输入消息..." style="flex:1;margin:0;">
        <button class="mock-button" style="margin:0;white-space:nowrap;">发送</button>
      </div>
    </div>
  </div>
</div>
